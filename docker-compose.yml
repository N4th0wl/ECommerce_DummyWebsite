version: '3.8'

services:
  # ─────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: shopvuln_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shopvuln
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - shopvuln_net

  # ─────────────────────────────────────────────
  # Node.js Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopvuln_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: rootpassword
      DB_NAME: shopvuln
      PORT: 5000
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shopvuln_net
    volumes:
      - ./backend/public:/app/public

  # ─────────────────────────────────────────────
  # React Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000
    container_name: shopvuln_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - shopvuln_net

volumes:
  mysql_data:

networks:
  shopvuln_net:
    driver: bridge
